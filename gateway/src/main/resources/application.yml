spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      mvc:
        routes:
          - id: user-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/users/**
            filters:
              - StripPrefix=0

          - id: auth-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/auth/**
            filters:
              - StripPrefix=0

          - id: report-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/report/**
            filters:
              - StripPrefix=0

          - id: inventory-service
            uri: http://localhost:8085
            predicates:
              - Path=/api/inventory/**
            filters:
              - StripPrefix=0

          - id: notification-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/notification/**
            filters:
              - StripPrefix=0

          - id: statistics-service
            uri: http://localhost:8086
            predicates:
              - Path=/api/statistics/**
            filters:
              - StripPrefix=0
server:
  port: 8080