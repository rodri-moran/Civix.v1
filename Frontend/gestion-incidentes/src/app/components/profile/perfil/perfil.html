<div class="container mt-4">
  <div class="row">
    <!-- Columna izquierda -->
    <div class="col-md-3 mb-4">
      <div class="card shadow-sm p-3 profile-side">
        <div class="text-center">
          <i class="bi bi-person-circle text-primary" style="font-size: 80px"></i>
          <h5 class="fw-bold mt-2">{{ user.name }} {{ user.lastName }}</h5>
        </div>

        <ul class="list-group list-group-flush mt-3">
          <li class="list-group-item active">Mi Perfil</li>
        </ul>
      </div>
    </div>

    <!-- Columna derecha -->
    <div class="col-md-9">
      <div class="card shadow-sm p-4">
        <h3 class="fw-bold text-primary mb-3">Mi Perfil</h3>
        <hr />

        <form (ngSubmit)="saveChanges()">
          <div class="row g-3 mt-2">
            <!-- Nombre -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nombre</label>
              <input
                type="text"
                class="form-control profile-input"
                [(ngModel)]="editedValues.name"
                name="name"
                [disabled]="!isEditing"
                (ngModelChange)="detectChanges()"
              />
            </div>

            <!-- Apellido -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Apellido</label>
              <input
                type="text"
                class="form-control profile-input"
                [(ngModel)]="editedValues.lastName"
                name="lastName"
                [disabled]="!isEditing"
                (ngModelChange)="detectChanges()"
              />
            </div>

            <!-- Email (NO editable) -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email</label>
              <input class="form-control profile-input" [value]="user.email" disabled />
            </div>

            <!-- Teléfono -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Teléfono</label>
              <input
                type="text"
                class="form-control profile-input"
                [(ngModel)]="editedValues.phone"
                name="phone"
                [disabled]="!isEditing"
                (ngModelChange)="detectChanges()"
              />
            </div>

            <!-- Dirección -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Dirección</label>
              <input
                type="text"
                class="form-control profile-input"
                [(ngModel)]="editedValues.address"
                name="address"
                [disabled]="!isEditing"
                (ngModelChange)="detectChanges()"
              />
            </div>

            <!-- Rol -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Rol</label>
              <input class="form-control profile-input" [value]="user.role" disabled />
            </div>
          </div>

          <div class="row mt-4 justify-content-end">
            <div class="col-auto">
              <button
                type="submit"
                class="btn btn-success btn-profile"
                [disabled]="!hasChanges || !isEditing"
              >
                Guardar cambios
              </button>
            </div>

            <div class="col-auto">
              <button type="button" class="btn btn-success btn-profile" (click)="toggleEdit()">
                {{ isEditing ? 'Cancelar edición' : 'Editar perfil' }}
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
