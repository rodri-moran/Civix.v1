<div class="d-flex">
  
  <main class="flex-grow-1 p-4">
    <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item">
        <a routerLink="/">Inicio</a>
      </li>
      <li class="breadcrumb-item active" aria-current="page">Mis Reportes</li>
    </ol>
  </nav>
    <h3 class="mb-4">📊 Mis Reportes</h3>
    <table class="table table-striped table-hover shadow-sm rounded">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Título</th>
          <th>Descripción</th>
          <th>Dirección</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let reporte of reports; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ reporte.title }}</td>
          <td>{{ reporte.description }}</td>
          <td>{{ reporte.address }}</td>
          <td>
          <span class="badge px-3 py-2"
      [ngClass]="statusLabels[reporte.status].class">
  {{ statusLabels[reporte.status].text }}
</span>          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="reports.length === 0" class="alert alert-info mt-3">
      No has realizado ningún reporte todavía.
    </div>
  </main>

  <style>
    .custom-header {
      background-color: var(--color-primary, #2c3e50);
    }
  </style>
</div>
