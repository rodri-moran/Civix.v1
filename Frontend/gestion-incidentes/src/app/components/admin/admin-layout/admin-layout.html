<header class="text-white shadow-sm custom-header">
  <div class="container-fluid d-flex justify-content-between align-items-center py-3 px-4">
    <div class="logo">
      <a routerLink="/admin" class="h4 mb-0 text-white text-decoration-none"> Comuna Digital </a>
    </div>

    <button class="btn btn-outline-light btn-sm px-3">Cerrar Sesión</button>
  </div>
</header>

<div class="d-flex">
  <aside class="sidebar bg-light border-end p-3" style="transition: width 0.3s ease">
    <div class="sidebar-content">
      <nav class="nav flex-column mt-4">
        <a
          *ngFor="let item of menuItems"
          (click)="navigate(item.route)"
          class="nav-link d-flex align-items-center mb-3 p-2 rounded hover-highlight"
          [class.active]="currentRoute === item.route"
        >
          <i [class]="item.icon + ' me-2 text-primary'"></i>
          <span>{{ item.title }}</span>
        </a>
      </nav>
    </div>
  </aside>

  <main class="flex-grow-1 p-4">
    <router-outlet></router-outlet>
  </main>
</div>
