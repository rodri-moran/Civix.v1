<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="fw-bold text-dark m-0">Cuadrillas</h3>
  <button
    class="btn btn-success d-flex align-items-center shadow-sm rounded-pill px-3"
    data-bs-toggle="modal"
    data-bs-target="#createModal"
  >
    <i class="bi bi-plus-lg me-2"></i> Nueva cuadrilla
  </button>
</div>

<div class="table-responsive shadow-sm rounded-4 border bg-white p-3">
  <table class="table table-hover align-middle mb-0">
    <thead class="table-light border-bottom">
      <tr class="text-secondary text-uppercase small">
        <th>#</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Área</th>
        <th>Integrantes</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let squad of squads; let i = index" class="table-row-hover">
        <td class="fw-semibold">{{ i + 1 }}</td>
        <td>{{ squad.name }}</td>
        <td>{{ squad.description }}</td>
        <td
          [ngClass]="{
            'text-danger': squad.area === 'RECOLECCION',
            'bg-primary': squad.area === 'OBRAS',
            'text-info': squad.area === 'ALUMBRADO'
          }"
        >
          {{ squad.area }}
        </td>
        <td>{{ squad.teamSize }}</td>
      </tr>
    </tbody>
  </table>
</div>

<div
  class="modal fade"
  id="createModal"
  tabindex="-1"
  aria-labelledby="createModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="createModalLabel">Crear cuadrilla</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <section class="bg-white rounded shadow-sm p-5 border">
          <h2 class="mb-4 text-primary">Crear cuadrilla</h2>
          <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
            <div class="mb-3">
              <label for="name" class="form-label">Nombre</label>
              <input
                type="text"
                id="name"
                class="form-control"
                placeholder="Ej: Alumbrado"
                required
                name="name"
                [(ngModel)]="name"
              />
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">Descripción</label>
              <textarea
                id="description"
                rows="4"
                class="form-control"
                placeholder="Descripción de la cuadrilla"
                required
                name="description"
                [(ngModel)]="description"
              ></textarea>
            </div>

            <div class="mb-3">
              <label for="area" class="form-label">Área</label>
              <select id="area" class="form-select" name="area" [(ngModel)]="selectedArea" required>
                <option value="" disabled selected>Seleccione un área</option>
                <option *ngFor="let area of areas" [value]="area.name">
                  {{ area.name | titlecase }}
                </option>
              </select>
            </div>

            <div class="mb-3">
              <label for="teamSize" class="form-label">Cantidad de integrantes</label>
              <input
                type="number"
                id="teamSize"
                class="form-control"
                placeholder="2"
                required
                min="1"
                name="teamSize"
                [(ngModel)]="teamSize"
              />
            </div>

            <button type="submit" class="btn btn-primary btn-lg">Crear cuadrilla</button>
          </form>
        </section>
      </div>
    </div>
  </div>
</div>
